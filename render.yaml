services:
  - type: web
    name: gymtracker
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: gymtracker-db
          property: connectionString

databases:
  - name: gymtracker-db
